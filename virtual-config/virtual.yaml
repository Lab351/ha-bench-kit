version: 1
# ###
# Generic devices
# ###
# devices:
#   Test Motion Sensor:
#     - platform: binary_sensor
#       class: motion
#       initial_value: "off"

#   Test Temperature Sensor:
#     - platform: sensor
#       class: temperature
#       initial_value: 22
#       unit_of_measurement: "C"

#   Test Light:
#     - platform: light
#       initial_value: "on"
#       support_brightness: true
#       initial_brightness: 100

#   Test Door Lock:
#     - platform: lock
#       initial_value: locked

#   Test Fan:
#     - platform: fan
#       speed_count: 5
#       direction: true
#       oscillate: true

#   Test Cover:
#     - platform: cover
#       initial_value: "closed"
